#:schema node_modules/wrangler/config-schema.json
name = "nex-tools"
main = "worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "."
binding = "ASSETS"
# .assetsignore at repo root excludes .git/, node_modules/, worker.js, etc.
