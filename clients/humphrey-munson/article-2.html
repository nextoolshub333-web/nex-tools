/* OVERFLOW FIX + REVEAL ANIMATIONS (injected 2026-04-18) */

section, header, footer { max-width: 100%; overflow-x: clip; }

.reveal-fx.in { opacity: 1; transform: translateY(0); }
@media (prefers-reduced-motion: reduce) { .reveal-fx { opacity: 1; transform: none; transition: none; } }

</div><script>
(function(){
  var sel = 'section, .tier, .service-card, .step, .why-item, .included-item, .zero-risk-item, .faq-item, .related-card, .inline-cta, .inline-cta-strong, .about-box, .article-body > h2, .article-body > h3, .article-body > blockquote';
  var els = document.querySelectorAll(sel);
  if (!els.length) return;
  els.forEach(function(el){ el.classList.add('reveal-fx'); });
  if (!('IntersectionObserver' in window)) { els.forEach(function(el){ el.classList.add('in'); }); return; }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
  els.forEach(function(el){ io.observe(el); });
})();
</script>
